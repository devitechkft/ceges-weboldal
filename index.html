<!DOCTYPE html>
<html lang="hu">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Devitech Kft.</title>

    <meta name="description"
          content="Modern webes rendszerek, mobilalkalmazások és AI-alapú megoldások fejlesztése.">

    <meta property="og:title" content="Devitech Kft.">
    <meta property="og:description" content="Modern szoftverfejlesztés vállalkozások számára.">
    <meta property="og:image" content="images/devitech_logo.png">

    <link rel="alternate" hreflang="hu" href="https://devitech.hu/">
    <link rel="alternate" hreflang="en" href="https://devitech.hu/en/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="container navbar">

        <a href="#" class="logo">
            <img src="images/devitech_logo.png" alt="Devitech logo">
        </a>

        <nav>

            <a href="#services"
               data-i18n="nav.services">
            </a>
            <a href="#about" data-i18n="nav.about"></a>
            <a href="#contact" data-i18n="nav.contact"></a>

        </nav>

        <div class="language-switcher">

            <button data-lang="hu" class="active">
                HU
            </button>

            <button data-lang="en">
                EN
            </button>

        </div>

    </div>

</header>

<section class="hero">

    <div class="container hero-grid">

        <div>

            <span class="badge" data-i18n="hero.badge">
            </span>

            <h1 data-i18n="hero.title">
            </h1>

            <p data-i18n="hero.description">
            </p>

            <div class="buttons">

                <a href="#contact" class="primary" data-i18n="hero.contact">
                </a>

                <a href="#services" class="secondary" data-i18n="hero.services">
                </a>

            </div>

        </div>

        <div class="hero-logo">

            <img src="images/logo.png"
                 alt="Devitech">

        </div>

    </div>

</section>

<section id="services">

    <div class="container">

        <h2 data-i18n="services.title"></h2>

        <div class="cards">

            <article>

                <h3 data-i18n="services.web.title"></h3>

                <p data-i18n="services.web.desc">
                </p>

            </article>

            <article>

                <h3 data-i18n="services.mobile.title"></h3>

                <p data-i18n="services.mobile.desc">
                </p>

            </article>

            <article>

                <h3 data-i18n="services.ai.title"></h3>

                <p data-i18n="services.ai.desc">
                </p>

            </article>

            <article>

                <h3 data-i18n="services.cloud.title"></h3>

                <p data-i18n="services.cloud.desc">
                </p>

            </article>

        </div>

    </div>

</section>

<section id="about">

    <div class="container">

        <h2 data-i18n="about.title"></h2>

        <p class="center" data-i18n="about.text">
        </p>

    </div>

</section>

<section id="contact">

    <div class="container contact-box">

        <h2 data-i18n="contact.title"></h2>

        <p data-i18n="contact.text">
        </p>

        <a class="primary"
           href="mailto:info@devitech.hu">

            info@devitech.hu

        </a>

    </div>

</section>

<footer>

    © 2026 Devitech Kft.

</footer>

</body>
</html>
